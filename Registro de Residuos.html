    <!-- Modal para responsable -->
    <div class="modal" id="modal-responsable">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Responsable</h2>
                <button class="close-modal" onclick="cerrarModalResponsable()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="responsable-input-container">
                    <label for="nombre-responsable" style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark-color);">
                        <i class="fas fa-user"></i> Nombre del responsable:
                    </label>
                    <input type="text" id="nombre-responsable" placeholder="Ingrese el nombre completo" autocomplete="off">
                    <div class="responsable-actions">
                        <button class="btn-cancelar-responsable" onclick="cerrarModalResponsable()">Cancelar</button>
                        <button class="btn-guardar-responsable" onclick="guardarResponsable()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay de carga -->
    <div id="overlay">
        <div class="spinner"></div>
        <div id="loadingMessage">
            <h4>Por favor espera un momento...</h4>
            <p id="loading-detail"></p>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN GENERAL ==========
        // URLs de los scripts de Google Apps Script
        const SCRIPT_URL_RESIDUOS = "https://script.google.com/macros/s/AKfycbyEonibd5OZnnSMJidnlAWTcFjKJvH6TehqaYVdxGsIVi59z3W96qX9-OUEEKOuHeg7Xg/exec";
        const SCRIPT_URL_RECOLECCION = "https://script.google.com/macros/s/AKfycbxGJ75ow7UWpJu4hR4kklUlTFpMPvf-qaFCSt87NLtFRZ3tTPfNfqdUWRVIC53wbq3C/exec"; // REEMPLAZAR CON LA URL DEL NUEVO SCRIPT
        
        // Variables globales
        let datosResiduos = [];        // Array para registros de residuos
        let datosRecoleccion = [];     // Array para registros de recolección
        let tipoResiduoSeleccionado = "Común";
        let clasificacionSeleccionada = "Orgánico";
        let estadoFisicoSeleccionado = "Sólido";
        let edificioSeleccionado = "";
        let registroEnEdicion = null;
        let responsableActual = null;
        let pestañaActiva = 'residuos'; // 'residuos' o 'recoleccion'
        
        // Variables para selección múltiple en recolección
        let tiposResiduoRecoleccion = [];

        // Variables para control de conexión
        let isOnline = navigator.onLine;

        // ========== FUNCIONES DE INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Inicializando aplicación...');
            
            actualizarEstadoConexion();
            cargarResponsable();
            
            // Inicializar fechas
            inicializarFechas();
            
            // Cargar datos locales
            cargarDatosLocales();
            
            // Cargar última selección de edificio
            cargarUltimaSeleccion();
            
            // Actualizar contadores
            actualizarContadores();
            
            // Configurar eventos
            configurarEventos();
            
            // Prevenir menú contextual y selección
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
            });

            console.log('✅ Aplicación inicializada correctamente');
        });

        function inicializarFechas() {
            // Fecha actual para el formulario de residuos (formato DD/MM/AAAA)
            var today = new Date();
            var dd = String(today.getDate()).padStart(2, '0');
            var mm = String(today.getMonth() + 1).padStart(2, '0');
            var yyyy = today.getFullYear();
            document.getElementById("fecha-residuos").value = dd + '/' + mm + '/' + yyyy;
            
            // Fecha actual para el formulario de recolección (formato YYYY-MM-DD para input date)
            var year = today.getFullYear();
            var month = String(today.getMonth() + 1).padStart(2, '0');
            var day = String(today.getDate()).padStart(2, '0');
            document.getElementById("fecha-recoleccion").value = year + '-' + month + '-' + day;
        }

        // ========== FUNCIONES DE TABS ==========
        function cambiarTab(tab) {
            pestañaActiva = tab;
            
            // Actualizar clases de los botones de tab
            document.getElementById('tab-residuos').classList.remove('active');
            document.getElementById('tab-recoleccion').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // Actualizar contenido visible
            document.getElementById('tab-content-residuos').classList.remove('active');
            document.getElementById('tab-content-recoleccion').classList.remove('active');
            document.getElementById(`tab-content-${tab}`).classList.add('active');
            
            // Actualizar el badge de notificación según la pestaña activa
            actualizarBadgeNotificacion();
            
            console.log(`📋 Cambiado a pestaña: ${tab}`);
        }

        // ========== FUNCIONES DE CARGA/GUARDADO LOCAL ==========
        function cargarDatosLocales() {
            // Cargar registros de residuos
            let datosGuardadosResiduos = localStorage.getItem('registrosResiduos');
            if (datosGuardadosResiduos) {
                datosResiduos = JSON.parse(datosGuardadosResiduos);
                console.log(`📊 Cargados ${datosResiduos.length} registros de residuos`);
            }
            
            // Cargar registros de recolección
            let datosGuardadosRecoleccion = localStorage.getItem('registrosRecoleccion');
            if (datosGuardadosRecoleccion) {
                datosRecoleccion = JSON.parse(datosGuardadosRecoleccion);
                console.log(`📊 Cargados ${datosRecoleccion.length} registros de recolección`);
            }
        }

        function guardarDatosResiduos() {
            localStorage.setItem('registrosResiduos', JSON.stringify(datosResiduos));
        }

        function guardarDatosRecoleccion() {
            localStorage.setItem('registrosRecoleccion', JSON.stringify(datosRecoleccion));
        }

        function actualizarContadores() {
            actualizarBadgeNotificacion();
            
            // Actualizar estado del botón de sincronizar si el modal está abierto
            const btnSincronizar = document.getElementById('btn-sincronizar');
            if (btnSincronizar && document.getElementById('modal-registros').style.display === 'flex') {
                actualizarEstadoBotonSincronizar();
            }
        }

        function actualizarBadgeNotificacion() {
            const badge = document.getElementById('notification-badge');
            let cantidad = 0;
            
            if (pestañaActiva === 'residuos') {
                cantidad = datosResiduos.length;
            } else {
                cantidad = datosRecoleccion.length;
            }
            
            if (cantidad > 0) {
                badge.style.display = 'flex';
                badge.textContent = cantidad > 99 ? '99+' : cantidad;
            } else {
                badge.style.display = 'none';
            }
        }

        // ========== FUNCIONES PARA REGISTRO DE RESIDUOS (TAB 1) ==========
        function cargarUltimaSeleccion() {
            let ultimoEdificio = localStorage.getItem('ultimoEdificio');
            if (ultimoEdificio) {
                const botonEdificio = $(`#edificio-group button[data-value="${ultimoEdificio}"]`);
                if (botonEdificio.length) {
                    botonEdificio.addClass('active');
                    edificioSeleccionado = ultimoEdificio;
                }
            }
            verificarFormularioResiduos();
        }

        function guardarUltimaSeleccion() {
            if (edificioSeleccionado) {
                localStorage.setItem('ultimoEdificio', edificioSeleccionado);
            }
        }

        function resetearSeleccionesResiduos() {
            $('#tipo-residuo-residuos button').removeClass('active');
            $('#tipo-residuo-residuos button[data-value="Común"]').addClass('active');
            tipoResiduoSeleccionado = "Común";
            
            $('#clasificacion-residuos button').removeClass('active');
            $('#clasificacion-residuos button[data-value="Orgánico"]').addClass('active');
            clasificacionSeleccionada = "Orgánico";
            
            $('#estado-fisico-residuos button').removeClass('active');
            $('#estado-fisico-residuos button[data-value="Sólido"]').addClass('active');
            estadoFisicoSeleccionado = "Sólido";
        }

        function configurarEventos() {
            // Eventos para el formulario de residuos
            $('#edificio-group button').on('click', function() {
                $('#edificio-group button').removeClass('active');
                $(this).addClass('active');
                edificioSeleccionado = $(this).data('value');
                guardarUltimaSeleccion();
                verificarFormularioResiduos();
            });

            $('#tipo-residuo-residuos button').on('click', function() {
                $('#tipo-residuo-residuos button').removeClass('active');
                $(this).addClass('active');
                tipoResiduoSeleccionado = $(this).data('value');
                verificarFormularioResiduos();
            });

            $('#clasificacion-residuos button').on('click', function() {
                $('#clasificacion-residuos button').removeClass('active');
                $(this).addClass('active');
                clasificacionSeleccionada = $(this).data('value');
                verificarFormularioResiduos();
            });

            $('#estado-fisico-residuos button').on('click', function() {
                $('#estado-fisico-residuos button').removeClass('active');
                $(this).addClass('active');
                estadoFisicoSeleccionado = $(this).data('value');
                verificarFormularioResiduos();
            });

            $("#cantidad-residuos").on("change input", verificarFormularioResiduos);
            
            // Eventos para el formulario de recolección
            $('#tipo-residuo-recoleccion button').on('click', function() {
                $(this).toggleClass('selected');
                actualizarTiposSeleccionados();
                verificarFormularioRecoleccion();
            });
            
            $("#fecha-recoleccion").on("change", verificarFormularioRecoleccion);
            $("#destino-recoleccion").on("change input", verificarFormularioRecoleccion);
        }

        function verificarFormularioResiduos() {
            let cantidad = $("#cantidad-residuos").val();

            if (edificioSeleccionado !== "" && cantidad.trim() !== "" && parseFloat(cantidad) > 0) {
                $("#registrar-residuos").prop("disabled", false);
            } else {
                $("#registrar-residuos").prop("disabled", true);
            }
        }

        function registrarEntradaResiduos() {
            let fecha = $('#fecha-residuos').val();
            let cantidad = parseFloat($('#cantidad-residuos').val());

            let registro = {
                fecha: fecha,
                edificio: edificioSeleccionado,
                tipoResiduo: tipoResiduoSeleccionado,
                cantidad: cantidad,
                clasificacion: clasificacionSeleccionada,
                estadoFisico: estadoFisicoSeleccionado,
                timestamp: new Date().getTime()
            };

            if (registroEnEdicion !== null) {
                const index = datosResiduos.findIndex(r => r.timestamp === registroEnEdicion.timestamp);
                if (index !== -1) {
                    datosResiduos[index] = registro;
                    registroEnEdicion = null;
                    localStorage.removeItem('registroEditando');
                }
            } else {
                datosResiduos.push(registro);
            }

            guardarDatosResiduos();
            actualizarContadores();

            Swal.fire({
                title: registroEnEdicion !== null ? 'Registro Actualizado' : 'Registro Exitoso',
                html: `
                    <div style="text-align: center;">
                        <p style="font-size: 1.1em; margin-bottom: 15px;">El registro se ha ${registroEnEdicion !== null ? 'actualizado' : 'guardado'} correctamente.</p>
                        <p style="font-size: 0.9em; color: #7f8c8d;">Registros pendientes de sincronizar: ${datosResiduos.length}</p>
                        <div style="color: #28a745; font-size: 2em;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                `,
                icon: 'success',
                confirmButtonText: 'Aceptar',
                confirmButtonColor: '#28a745'
            }).then(() => {
                resetearSeleccionesResiduos();
                $('#cantidad-residuos').val('');
                $('#cantidad-residuos').focus();
                verificarFormularioResiduos();
            });
        }

        // ========== FUNCIONES PARA REGISTRO DE RECOLECCIÓN (TAB 2) ==========
        function actualizarTiposSeleccionados() {
            tiposResiduoRecoleccion = [];
            
            $('#tipo-residuo-recoleccion button.selected').each(function() {
                tiposResiduoRecoleccion.push($(this).data('value'));
            });
            
            // Actualizar visualización de tags
            const container = document.getElementById('tipos-seleccionados-container');
            const tagsContainer = document.getElementById('tipos-seleccionados-tags');
            
            if (tiposResiduoRecoleccion.length > 0) {
                container.style.display = 'flex';
                tagsContainer.innerHTML = '';
                
                tiposResiduoRecoleccion.forEach(tipo => {
                    const tag = document.createElement('span');
                    tag.className = 'tipo-tag';
                    tag.innerHTML = `${tipo} <i class="fas fa-times" onclick="eliminarTipoSeleccionado('${tipo}')"></i>`;
                    tagsContainer.appendChild(tag);
                });
            } else {
                container.style.display = 'none';
            }
        }

        function eliminarTipoSeleccionado(tipo) {
            $(`#tipo-residuo-recoleccion button[data-value="${tipo}"]`).removeClass('selected');
            actualizarTiposSeleccionados();
            verificarFormularioRecoleccion();
        }

        function verificarFormularioRecoleccion() {
            let fecha = $("#fecha-recoleccion").val();
            let destino = $("#destino-recoleccion").val().trim();

            if (fecha && tiposResiduoRecoleccion.length > 0 && destino) {
                $("#registrar-recoleccion").prop("disabled", false);
            } else {
                $("#registrar-recoleccion").prop("disabled", true);
            }
        }

        function registrarEntradaRecoleccion() {
            let fecha = $('#fecha-recoleccion').val();
            let destino = $('#destino-recoleccion').val().trim();
            
            // Convertir fecha de YYYY-MM-DD a DD/MM/AAAA para consistencia
            let fechaParts = fecha.split('-');
            let fechaFormateada = fechaParts[2] + '/' + fechaParts[1] + '/' + fechaParts[0];

            let registro = {
                fechaSalida: fechaFormateada,
                fechaOriginal: fecha, // Guardar también el formato original
                tiposResiduo: tiposResiduoRecoleccion,
                destino: destino,
                timestamp: new Date().getTime()
            };

            datosRecoleccion.push(registro);
            guardarDatosRecoleccion();
            actualizarContadores();

            Swal.fire({
                title: 'Registro Exitoso',
                html: `
                    <div style="text-align: center;">
                        <p style="font-size: 1.1em; margin-bottom: 15px;">El registro de recolección se ha guardado correctamente.</p>
                        <p style="font-size: 0.9em; color: #7f8c8d;">Registros pendientes de sincronizar: ${datosRecoleccion.length}</p>
                        <div style="color: #28a745; font-size: 2em;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                `,
                icon: 'success',
                confirmButtonText: 'Aceptar',
                confirmButtonColor: '#28a745'
            }).then(() => {
                // Limpiar selecciones
                $('#tipo-residuo-recoleccion button').removeClass('selected');
                tiposResiduoRecoleccion = [];
                actualizarTiposSeleccionados();
                
                $('#destino-recoleccion').val('');
                
                // Resetear fecha al día actual
                var today = new Date();
                var year = today.getFullYear();
                var month = String(today.getMonth() + 1).padStart(2, '0');
                var day = String(today.getDate()).padStart(2, '0');
                document.getElementById("fecha-recoleccion").value = year + '-' + month + '-' + day;
                
                verificarFormularioRecoleccion();
            });
        }

        // ========== FUNCIONES PARA MODAL DE REGISTROS ==========
        function mostrarModalRegistros() {
            const modal = document.getElementById('modal-registros');
            const modalBody = document.getElementById('modal-body');
            const contador = document.getElementById('contador-registros');
            const modalTitulo = document.getElementById('modal-titulo');
            const btnSincronizar = document.getElementById('btn-sincronizar');
            
            let datosActuales = pestañaActiva === 'residuos' ? datosResiduos : datosRecoleccion;
            
            if (pestañaActiva === 'residuos') {
                modalTitulo.textContent = 'Registros de Residuos Pendientes';
                contador.textContent = `${datosActuales.length} registro${datosActuales.length !== 1 ? 's' : ''} pendiente${datosActuales.length !== 1 ? 's' : ''}`;
            } else {
                modalTitulo.textContent = 'Registros de Recolección Pendientes';
                contador.textContent = `${datosActuales.length} registro${datosActuales.length !== 1 ? 's' : ''} pendiente${datosActuales.length !== 1 ? 's' : ''}`;
            }
            
            // Actualizar estado del botón de sincronizar
            actualizarEstadoBotonSincronizar();
            
            if (datosActuales.length === 0) {
                modalBody.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No hay registros pendientes</h3>
                        <p>Los registros que crees aparecerán aquí para revisión antes de sincronizar.</p>
                    </div>
                `;
            } else {
                let tablaHTML = '';
                
                if (pestañaActiva === 'residuos') {
                    // Tabla para registros de residuos
                    tablaHTML = `
                        <div class="table-container">
                            <table class="registros-table">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Edificio</th>
                                        <th>Tipo Residuo</th>
                                        <th>Cantidad (Lbs)</th>
                                        <th>Clasificación</th>
                                        <th>Estado Físico</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    
                    datosActuales.forEach((registro, index) => {
                        const estaEnConfirmacion = registro.enConfirmacion;
                        tablaHTML += `
                            <tr>
                                <td>${registro.fecha}</td>
                                <td>${registro.edificio}</td>
                                <td>${registro.tipoResiduo}</td>
                                <td>${registro.cantidad}</td>
                                <td>${registro.clasificacion}</td>
                                <td>${registro.estadoFisico}</td>
                                <td class="acciones-cell">
                                    ${estaEnConfirmacion ? `
                                        <button class="btn-confirmar" onclick="confirmarEliminacionResiduos(${index})" title="Confirmar eliminación">
                                            <i class="fas fa-check"></i>
                                        </button>
                                        <button class="btn-cancelar" onclick="cancelarEliminacionResiduos(${index})" title="Cancelar eliminación">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    ` : `
                                        <button class="btn-editar" onclick="editarRegistroResiduos(${index})" title="Editar registro">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-eliminar" onclick="solicitarEliminacionResiduos(${index})" title="Eliminar registro">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    `}
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    // Tabla para registros de recolección
                    tablaHTML = `
                        <div class="table-container">
                            <table class="registros-table">
                                <thead>
                                    <tr>
                                        <th>Fecha Salida</th>
                                        <th>Tipos de Residuo</th>
                                        <th>Destino</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    
                    datosActuales.forEach((registro, index) => {
                        const estaEnConfirmacion = registro.enConfirmacion;
                        tablaHTML += `
                            <tr>
                                <td>${registro.fechaSalida}</td>
                                <td>${registro.tiposResiduo.join(', ')}</td>
                                <td>${registro.destino}</td>
                                <td class="acciones-cell">
                                    ${estaEnConfirmacion ? `
                                        <button class="btn-confirmar" onclick="confirmarEliminacionRecoleccion(${index})" title="Confirmar eliminación">
                                            <i class="fas fa-check"></i>
                                        </button>
                                        <button class="btn-cancelar" onclick="cancelarEliminacionRecoleccion(${index})" title="Cancelar eliminación">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    ` : `
                                        <button class="btn-eliminar" onclick="solicitarEliminacionRecoleccion(${index})" title="Eliminar registro">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    `}
                                </td>
                            </tr>
                        `;
                    });
                }
                
                tablaHTML += `
                                </tbody>
                            </table>
                        </div>
                        <div class="scroll-indicator">
                            <i class="fas fa-arrows-alt-h"></i> Desliza horizontalmente para ver más información
                        </div>
                `;
                
                modalBody.innerHTML = tablaHTML;
            }
            
            modal.style.display = 'flex';
        }

        // Funciones para editar/eliminar registros de residuos
        function editarRegistroResiduos(index) {
            const registro = datosResiduos[index];
            
            registroEnEdicion = registro;
            localStorage.setItem('registroEditando', JSON.stringify(registro));
            
            // Cambiar a la pestaña de residuos si no está activa
            if (pestañaActiva !== 'residuos') {
                cambiarTab('residuos');
            }
            
            cargarRegistroEnFormulario(registro);
            
            cerrarModal();
            
            Swal.fire({
                title: 'Registro cargado para edición',
                text: 'El registro se ha cargado en el formulario. Realiza los cambios necesarios y guarda el registro actualizado.',
                icon: 'info',
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#3498db'
            });
        }

        function cargarRegistroEnFormulario(registro) {
            document.getElementById('fecha-residuos').value = registro.fecha;
            
            $(`#edificio-group button[data-value="${registro.edificio}"]`).click();
            $(`#tipo-residuo-residuos button[data-value="${registro.tipoResiduo}"]`).click();
            $(`#clasificacion-residuos button[data-value="${registro.clasificacion}"]`).click();
            $(`#estado-fisico-residuos button[data-value="${registro.estadoFisico}"]`).click();
            
            document.getElementById('cantidad-residuos').value = registro.cantidad;
            
            $('#cantidad-residuos').focus();
        }

        function solicitarEliminacionResiduos(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            datosResiduos[index].enConfirmacion = true;
            guardarDatosResiduos();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        function confirmarEliminacionResiduos(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            datosResiduos.splice(index, 1);
            guardarDatosResiduos();
            actualizarContadores();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        function cancelarEliminacionResiduos(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            delete datosResiduos[index].enConfirmacion;
            guardarDatosResiduos();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        // Funciones para eliminar registros de recolección
        function solicitarEliminacionRecoleccion(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            datosRecoleccion[index].enConfirmacion = true;
            guardarDatosRecoleccion();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        function confirmarEliminacionRecoleccion(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            datosRecoleccion.splice(index, 1);
            guardarDatosRecoleccion();
            actualizarContadores();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        function cancelarEliminacionRecoleccion(index) {
            const tableContainer = document.querySelector('.table-container');
            const scrollLeft = tableContainer ? tableContainer.scrollLeft : 0;
            
            delete datosRecoleccion[index].enConfirmacion;
            guardarDatosRecoleccion();
            mostrarModalRegistros();
            
            if (tableContainer) {
                setTimeout(() => {
                    tableContainer.scrollLeft = scrollLeft;
                }, 10);
            }
        }

        function cerrarModal() {
            // Limpiar estados de confirmación antes de cerrar
            if (pestañaActiva === 'residuos') {
                datosResiduos.forEach(registro => {
                    if (registro.enConfirmacion) {
                        delete registro.enConfirmacion;
                    }
                });
                guardarDatosResiduos();
            } else {
                datosRecoleccion.forEach(registro => {
                    if (registro.enConfirmacion) {
                        delete registro.enConfirmacion;
                    }
                });
                guardarDatosRecoleccion();
            }
            
            document.getElementById('modal-registros').style.display = 'none';
        }

        // ========== FUNCIONES DE SINCRONIZACIÓN ==========
        function sincronizarDatos() {
            console.log('🔄 Intentando sincronizar... Estado de conexión:', isOnline ? 'ONLINE' : 'OFFLINE');
            
            // Verificar conexión
            if (!isOnline) {
                Swal.fire({
                    title: 'Sin conexión',
                    text: 'No hay conexión a internet. Verifica tu conexión e intenta nuevamente.',
                    icon: 'error',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#e74c3c'
                });
                return;
            }

            let datosActuales = pestañaActiva === 'residuos' ? datosResiduos : datosRecoleccion;
            let scriptURL = pestañaActiva === 'residuos' ? SCRIPT_URL_RESIDUOS : SCRIPT_URL_RECOLECCION;

            if (datosActuales.length === 0) {
                Swal.fire({
                    title: 'Sin datos',
                    text: 'No hay registros pendientes para sincronizar.',
                    icon: 'info',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#3498db'
                });
                return;
            }

            // Verificar que haya un responsable configurado
            if (!responsableActual) {
                Swal.fire({
                    title: 'Responsable requerido',
                    text: 'Debe configurar un responsable antes de sincronizar',
                    icon: 'warning',
                    confirmButtonText: 'Configurar',
                    confirmButtonColor: '#f39c12',
                    showCancelButton: true,
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        cerrarModal();
                        mostrarModalResponsable();
                    }
                });
                return;
            }

            const datosBackup = [...datosActuales];
            const tipoRegistro = pestañaActiva === 'residuos' ? 'residuos' : 'recolección';

            cerrarModal();

            $('#sync-button').addClass('syncing');
            $('#overlay').css('display', 'flex');
            $('#loading-detail').text(`Sincronizando datos de ${tipoRegistro}...`);

            const timeoutDuration = 30000;
            const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error('Timeout: La sincronización está tomando demasiado tiempo')), timeoutDuration);
            });

            const ajaxPromise = new Promise((resolve, reject) => {
                console.log(`📤 Enviando datos de ${tipoRegistro} a Google Sheets...`);
                
                // Agregar el responsable a los datos
                const datosParaEnviar = datosActuales.map(registro => ({
                    ...registro,
                    responsable: responsableActual
                }));
                
                $.ajax({
                    url: scriptURL,
                    type: "POST",
                    data: {
                        registros: JSON.stringify(datosParaEnviar),
                        tipo: pestañaActiva // Enviar el tipo de registro
                    },
                    success: function(response) {
                        console.log('✅ Respuesta recibida:', response);
                        resolve(response);
                    },
                    error: function(xhr, status, error) {
                        console.log('❌ Error en AJAX:', status, error);
                        reject(error);
                    }
                });
            });

            Promise.race([ajaxPromise, timeoutPromise])
                .then(function(response) {
                    $('#overlay').hide();
                    $('#sync-button').removeClass('syncing');
                    
                    console.log('✅ Procesando respuesta...');
                    let responseData;
                    try {
                        responseData = typeof response === 'string' ? JSON.parse(response) : response;
                    } catch (e) {
                        console.log('❌ Error parseando respuesta:', e);
                        responseData = {success: false, message: 'Respuesta no válida del servidor'};
                    }
                    
                    if (responseData.success && responseData.registrosProcesados === datosActuales.length) {
                        // Vaciar el array correspondiente
                        if (pestañaActiva === 'residuos') {
                            datosResiduos = [];
                            guardarDatosResiduos();
                        } else {
                            datosRecoleccion = [];
                            guardarDatosRecoleccion();
                        }
                        actualizarContadores();
                        
                        let mensajeHTML = `
                            <div style="text-align: center;">
                                <p style="font-size: 1.1em; margin-bottom: 15px;">${responseData.message}</p>
                                <p style="font-size: 0.9em; color: #28a745;">
                                    <i class="fas fa-check-circle"></i> Todos los registros fueron procesados correctamente
                                </p>
                                <p style="font-size: 0.9em; color: #3498db;">
                                    <i class="fas fa-user"></i> Responsable: ${responsableActual}
                                </p>
                                <div style="color: #28a745; font-size: 2em; margin-top: 15px;">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                </div>
                        `;
                        
                        Swal.fire({
                            title: 'Sincronización Exitosa',
                            html: mensajeHTML,
                            icon: 'success',
                            confirmButtonText: 'Aceptar',
                            confirmButtonColor: '#28a745',
                            width: '500px'
                        });
                    } else if (responseData.success && responseData.registrosProcesados > 0) {
                        // Sincronización parcial - eliminar solo los que se procesaron
                        if (pestañaActiva === 'residuos') {
                            datosResiduos = datosBackup.slice(responseData.registrosProcesados);
                            guardarDatosResiduos();
                        } else {
                            datosRecoleccion = datosBackup.slice(responseData.registrosProcesados);
                            guardarDatosRecoleccion();
                        }
                        actualizarContadores();
                        
                        let mensajeHTML = `
                            <div style="text-align: center;">
                                <p style="font-size: 1.1em; margin-bottom: 15px;">${responseData.message}</p>
                                <p style="font-size: 0.9em; color: #f39c12;">
                                    <i class="fas fa-exclamation-triangle"></i> Sincronización parcial
                                </p>
                                <p style="font-size: 0.9em; color: #3498db;">
                                    <i class="fas fa-user"></i> Responsable: ${responsableActual}
                                </p>
                        `;
                        
                        if (responseData.detalles && responseData.detalles.length > 0) {
                            mensajeHTML += `
                                <div style="margin-top: 15px; text-align: left;">
                                    <p style="font-size: 0.9em; color: #e74c3c; margin-bottom: 8px;"><strong>Errores:</strong></p>
                                    <ul style="font-size: 0.8em; color: #7f8c8d; text-align: left; padding-left: 20px;">
                            `;
                            responseData.detalles.forEach(detalle => {
                                mensajeHTML += `<li>${detalle}</li>`;
                            });
                            mensajeHTML += `</ul></div>`;
                        }
                        
                        mensajeHTML += `</div>`;
                        
                        Swal.fire({
                            title: 'Sincronización Parcial',
                            html: mensajeHTML,
                            icon: 'warning',
                            confirmButtonText: 'Entendido',
                            confirmButtonColor: '#f39c12',
                            width: '600px'
                        });
                    } else {
                        Swal.fire({
                            title: 'Error en Sincronización',
                            text: responseData.message || 'Error desconocido al sincronizar',
                            icon: 'error',
                            confirmButtonText: 'Entendido',
                            confirmButtonColor: '#e74c3c'
                        });
                    }
                })
                .catch(function(error) {
                    $('#overlay').hide();
                    $('#sync-button').removeClass('syncing');
                    
                    console.log('❌ Error en sincronización:', error);
                    
                    // Restaurar backup si hubo error
                    if (pestañaActiva === 'residuos') {
                        datosResiduos = datosBackup;
                        guardarDatosResiduos();
                    } else {
                        datosRecoleccion = datosBackup;
                        guardarDatosRecoleccion();
                    }
                    actualizarContadores();
                    
                    let errorMessage = 'Error de conexión: ';
                    
                    if (error.message && error.message.includes('Timeout')) {
                        errorMessage = 'La sincronización está tomando demasiado tiempo. ';
                        errorMessage += 'Verifica tu conexión a internet e intenta nuevamente.';
                    } else {
                        errorMessage += 'No se pudo conectar al servidor. ';
                        errorMessage += 'Verifica tu conexión a internet.';
                    }
                    
                    Swal.fire({
                        title: 'Error de Conexión',
                        html: `
                            <div style="text-align: center;">
                                <p style="font-size: 1.1em; margin-bottom: 15px;">${errorMessage}</p>
                                <p style="font-size: 0.9em; color: #7f8c8d; margin-top: 15px;">
                                    <i class="fas fa-info-circle"></i> Los registros se mantienen guardados localmente para reintentar más tarde.
                                </p>
                                <div style="color: #e74c3c; font-size: 2em; margin-top: 15px;">
                                    <i class="fas fa-wifi-slash"></i>
                                </div>
                            </div>
                        `,
                        icon: 'error',
                        confirmButtonText: 'Entendido',
                        confirmButtonColor: '#e74c3c',
                        width: '500px'
                    });
                });
        }

        // ========== FUNCIONES DE RESPONSABLE ==========
        function cargarResponsable() {
            const responsableGuardado = localStorage.getItem('responsable');
            if (responsableGuardado) {
                try {
                    responsableActual = JSON.parse(responsableGuardado);
                } catch (e) {
                    responsableActual = responsableGuardado;
                }
                actualizarInterfazResponsable();
            }
        }

        function guardarResponsable() {
            const nombreInput = document.getElementById('nombre-responsable');
            const nombre = nombreInput.value.trim();
            
            if (!nombre) {
                Swal.fire({
                    title: 'Campo requerido',
                    text: 'Por favor ingrese el nombre del responsable',
                    icon: 'warning',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#f39c12'
                });
                return;
            }
            
            responsableActual = nombre;
            localStorage.setItem('responsable', JSON.stringify(nombre));
            
            actualizarInterfazResponsable();
            cerrarModalResponsable();
            
            Swal.fire({
                title: 'Responsable guardado',
                text: `El responsable ${nombre} ha sido guardado correctamente`,
                icon: 'success',
                confirmButtonText: 'Aceptar',
                confirmButtonColor: '#28a745',
                timer: 2000,
                showConfirmButton: true
            });
        }

        function actualizarInterfazResponsable() {
            const responsableInfo = document.getElementById('responsable-info');
            const responsableNombre = document.getElementById('responsable-nombre');
            
            if (responsableActual) {
                responsableInfo.style.display = 'flex';
                responsableNombre.textContent = responsableActual;
            } else {
                responsableInfo.style.display = 'none';
            }
            
            actualizarEstadoBotonSincronizar();
        }

        function mostrarModalResponsable() {
            const modal = document.getElementById('modal-responsable');
            const nombreInput = document.getElementById('nombre-responsable');
            
            if (responsableActual) {
                nombreInput.value = responsableActual;
            } else {
                nombreInput.value = '';
            }
            
            modal.style.display = 'flex';
        }

        function cerrarModalResponsable() {
            document.getElementById('modal-responsable').style.display = 'none';
        }

        function actualizarEstadoBotonSincronizar() {
            const btnSincronizar = document.getElementById('btn-sincronizar');
            if (!btnSincronizar) return;
            
            let datosActuales = pestañaActiva === 'residuos' ? datosResiduos : datosRecoleccion;
            
            if (!isOnline) {
                btnSincronizar.disabled = true;
                btnSincronizar.title = 'Sin conexión a internet';
            } else if (!responsableActual) {
                btnSincronizar.disabled = true;
                btnSincronizar.title = 'Debe configurar un responsable primero';
            } else if (datosActuales.length === 0) {
                btnSincronizar.disabled = true;
                btnSincronizar.title = 'No hay registros pendientes';
            } else {
                btnSincronizar.disabled = false;
                btnSincronizar.title = 'Sincronizar datos';
            }
        }

        // ========== FUNCIONES DE CONEXIÓN ==========
        function actualizarEstadoConexion() {
            isOnline = navigator.onLine;
            console.log('🔄 Estado de conexión actualizado:', isOnline ? 'ONLINE' : 'OFFLINE');
            
            const indicator = document.getElementById('conexion-indicator');
            const icon = document.getElementById('conexion-icon');
            const tooltip = document.getElementById('conexion-tooltip');
            const status = document.getElementById('conexion-status');
            
            if (isOnline) {
                if (indicator) {
                    indicator.className = 'conexion-indicator online';
                    indicator.title = 'Conectado a internet';
                }
                if (icon) icon.className = 'fas fa-wifi';
                if (tooltip) tooltip.textContent = 'Conectado a internet';
                
                if (status) {
                    status.className = 'conexion-status online';
                    status.innerHTML = '<i class="fas fa-wifi"></i><span>Conectado</span>';
                }

                actualizarEstadoBotonSincronizar();
                
                console.log('✅ Conexión restaurada - Modo online');
            } else {
                if (indicator) {
                    indicator.className = 'conexion-indicator offline';
                    indicator.title = 'Sin conexión a internet';
                }
                if (icon) icon.className = 'fas fa-wifi-slash';
                if (tooltip) tooltip.textContent = 'Sin conexión - Modo offline';
                
                if (status) {
                    status.className = 'conexion-status offline';
                    status.innerHTML = '<i class="fas fa-wifi-slash"></i><span>Sin conexión</span>';
                }

                if (btnSincronizar) {
                    btnSincronizar.disabled = true;
                }
                
                console.log('❌ Sin conexión a internet - Modo offline activado');
            }
        }

        // ========== EVENT LISTENERS GLOBALES ==========
        window.addEventListener('online', function() {
            console.log('🌐 Evento online detectado');
            actualizarEstadoConexion();
        });

        window.addEventListener('offline', function() {
            console.log('📵 Evento offline detectado');
            actualizarEstadoConexion();
        });

        window.onclick = function(event) {
            const modalRegistros = document.getElementById('modal-registros');
            const modalResponsable = document.getElementById('modal-responsable');
            
            if (event.target === modalRegistros) {
                cerrarModal();
            }
            if (event.target === modalResponsable) {
                cerrarModalResponsable();
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw-index.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('❌ Error al registrar Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
